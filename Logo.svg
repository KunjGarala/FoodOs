<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 600">
  <defs>
    <style>
      .outline { fill: none; stroke: #0d1b2a; stroke-width: 12; stroke-linecap: round; stroke-linejoin: round; }
      .fill-orange { fill: #fca311; }
      .fill-gold { fill: #e5c185; }
      .fill-dark { fill: #0d1b2a; }
    </style>
  </defs>

  <!-- Central emblem -->
  <g transform="translate(250, 250)">
    <!-- Background filled shapes -->
    <circle r="160" class="fill-orange" />
    <circle r="135" fill="#ffffff" />
    <g class="fill-orange" stroke="#fca311" stroke-width="25">
      <line y1="-160" y2="160" x1="0" x2="0" />
      <line x1="-160" x2="160" y1="0" y2="0" />
      <line y1="-113" y2="113" x1="-113" x2="113" />
      <line y1="113" y2="-113" x1="-113" x2="113" />
    </g>
    <circle r="35" class="fill-orange" />
    <circle r="15" class="fill-gold" />

    <!-- Outlines and decorative details -->
    <circle r="160" class="outline" />
    <circle r="135" class="outline" />
    <circle r="35" class="outline" />
    <g class="fill-gold outline">
      <path d="M-20,-170 L-20,-190 A20,20 0 0,1 20,-190 L20,-170" />
      <path d="M-20,170 L-20,190 A20,20 0 0,0 20,190 L20,170" />
      <path d="M170,-20 L190,-20 A20,20 0 0,1 190,20 L170,20" />
      <path d="M-170,-20 L-190,-20 A20,20 0 0,0 -190,20 L-170,20" />
      <path d="M120,-120 L135,-135 A15,15 0 0,1 155,-115 L140,-100" />
      <path d="M-120,-120 L-135,-135 A15,15 0 0,0 -155,-115 L-140,-100" />
      <path d="M120,120 L135,135 A15,15 0 0,0 155,115 L140,100" />
      <path d="M-120,120 L-135,135 A15,15 0 0,1 -155,115 L-140,100" />
    </g>

    <g transform="translate(0, -90)">
      <rect x="-20" y="-35" width="40" height="50" rx="5" class="fill-gold outline" stroke-width="8" />
      <path d="M-12,-15 h24 M-12,0 h15 M-12,15 h20" stroke="#0d1b2a" stroke-width="5" stroke-linecap="round" />
    </g>

    <g transform="rotate(45) translate(0, -90)">
      <path d="M-12,-35 L-12,0 Q-12,15 0,15 Q12,15 12,0 L12,-35 M0,15 L0,40" class="outline fill-gold" stroke-width="8" fill="none"/>
      <path d="M0,-35 L0,0" class="outline" stroke-width="8"/>
    </g>

    <g transform="translate(90, 0)">
      <rect x="-30" y="-25" width="60" height="40" rx="4" class="fill-gold outline" stroke-width="8" />
      <line x1="0" y1="15" x2="0" y2="25" class="outline" stroke-width="8" />
      <line x1="-15" y1="25" x2="15" y2="25" class="outline" stroke-width="8" />
      <rect x="-20" y="-15" width="15" height="10" fill="#fca311" />
      <rect x="5" y="-15" width="15" height="4" fill="#0d1b2a" />
      <rect x="5" y="-5" width="15" height="4" fill="#0d1b2a" />
    </g>

    <g transform="translate(65, 65)">
      <path d="M0,30 Q-15,30 -20,10 Q-25,-10 0,-30 Q25,-10 20,10 Q15,30 0,30 Z" class="fill-orange outline" stroke-width="8" />
      <path d="M0,30 Q5,20 5,10" fill="none" stroke="#0d1b2a" stroke-width="6" />
    </g>

    <g transform="translate(0, 90)">
      <path d="M-25,0 L-25,30 L25,30 L25,0" class="fill-gold outline" stroke-width="8" />
      <path d="M-30,0 L-30,-10 L30,-10 L30,0" class="fill-orange outline" stroke-width="8" />
      <path d="M-30,0 Q-20,10 -10,0 Q0,10 10,0 Q20,10 30,0" fill="none" stroke="#0d1b2a" stroke-width="6" />
      <rect x="-8" y="10" width="16" height="20" class="outline" fill="none" stroke-width="6" />
    </g>

    <g transform="translate(-65, 65)">
      <path d="M0,-20 L20,-10 L20,15 L0,25 L-20,15 L-20,-10 Z" class="fill-gold outline" stroke-width="8" />
      <path d="M-20,-10 L0,0 L20,-10 M0,0 L0,25" fill="none" stroke="#0d1b2a" stroke-width="6" />
    </g>

    <g transform="translate(-90, 0)">
      <rect x="-25" y="-30" width="50" height="60" rx="4" class="fill-gold outline" stroke-width="8" />
      <rect x="-15" y="-20" width="30" height="10" fill="#fca311" />
      <circle cx="-10" cy="5" r="3" fill="#0d1b2a" />
      <circle cx="0" cy="5" r="3" fill="#0d1b2a" />
      <circle cx="10" cy="5" r="3" fill="#0d1b2a" />
      <circle cx="-10" cy="18" r="3" fill="#0d1b2a" />
      <circle cx="0" cy="18" r="3" fill="#0d1b2a" />
      <circle cx="10" cy="18" r="3" fill="#0d1b2a" />
    </g>

    <g transform="rotate(-45) translate(0, -90)">
      <path d="M-5,10 L-5,-30 Q-5,-45 0,-50 Q5,-45 5,-30 L5,10 Z" class="fill-gold outline" stroke-width="8" />
      <path d="M-5,-30 Q-15,-20 -5,10" class="fill-gold outline" stroke-width="8" />
    </g>

    <circle cx="45" cy="-45" r="5" class="fill-gold" />
    <circle cx="-45" cy="45" r="5" class="fill-gold" />
    <circle cx="45" cy="45" r="5" class="fill-gold" />
    <circle cx="-45" cy="-45" r="5" class="fill-gold" />
  </g>
</svg>