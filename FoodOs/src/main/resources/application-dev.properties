spring.application.name=FoodOs
frontend.port.url=http://localhost:5173
backend.port.url=http://localhost:8081


## FRONTEND & BACKEND URL (PC IP)
#frontend.port.url=http://192.168.43.101:5173
#backend.port.url=http://192.168.43.101:8081
#
## SERVER
#server.address=0.0.0.0

server.port=8081

spring.datasource.url= ${spring.datasource.url}
spring.datasource.username = ${spring.datasource.username}
spring.datasource.password = ${spring.datasource.password}

spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

google.oauth.client-id=${google.oauth.client-id}
google.oauth.client-secret=${google.oauth.client-secret}
google.oauth.redirect-uri=${google.oauth.redirect-uri}
#google.oauth.redirect-uri=http://192.168.43.101:8081/oauth2/callback

#email config

spring.mail.host = ${spring.mail.host}
spring.mail.port = 587
spring.mail.username = ${spring.mail.username}
spring.mail.password = ${spring.mail.password}
spring.mail.properties.mail.smtp.auth = true
spring.mail.properties.mail.smtp.starttls.enable = true
spring.mail.properties.domain_name = ${spring.mail.username}


#Aws Config
aws.access-key-id=${aws.access-key-id}
aws.secret-access-key=${aws.secret-access-key}
aws.region=${aws.region}
aws.s3.bucket-name=${aws.s3.bucket-name}