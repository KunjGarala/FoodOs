spring.application.name=FoodOs
frontend.port.url=http://localhost:5173
backend.port.url=http://localhost:8080

spring.datasource.url= ${spring.datasource.url}
spring.datasource.username = ${spring.datasource.username}
spring.datasource.password = ${spring.datasource.password}

spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

google.oauth.client-id=${google.oauth.client-id}
google.oauth.client-secret=${google.oauth.client-secret}
google.oauth.redirect-uri=${google.oauth.redirect-uri}

#email config

spring.mail.host = ${spring.mail.host}
spring.mail.port = 587
spring.mail.username = ${spring.mail.username}
spring.mail.password = ${spring.mail.password}
spring.mail.properties.mail.smtp.auth = true
spring.mail.properties.mail.smtp.starttls.enable = true
spring.mail.properties.domain_name = ${spring.mail.username}
